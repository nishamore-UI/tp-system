<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="p-8">
    <h1 class="text-3xl font-bold mb-6">Admin Dashboard</h1>

    <div class="grid grid-cols-3 gap-6">

        <!-- Total Students -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold">Total Students</h2>
            <p class="text-3xl font-bold mt-2 text-blue-600">{{ total }}</p>
        </div>

        <!-- Placed Students -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold">Placed Students</h2>
            <p class="text-3xl font-bold mt-2 text-green-600">{{ placed }}</p>
        </div>

        <!-- Not Placed -->
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h2 class="text-lg font-semibold">Not Placed</h2>
            <p class="text-3xl font-bold mt-2 text-red-600">{{ not_placed }}</p>
        </div>

    </div>

    <div class="mt-8 space-x-4">
        <a href="{{ url_for('routes.students') }}" 
           class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700">
           View Students
        </a>

        <a href="{{ url_for('routes.add_student') }}" 
           class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700">
           Add Student
        </a>

        <a href="{{ url_for('routes.logout') }}" 
           class="bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700">
           Logout
        </a>
    </div>
</div>

</body>
</html>
