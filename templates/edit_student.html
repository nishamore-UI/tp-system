<body>

    <div class="container mt-5">
        <h2 class="mb-4">Edit Student</h2>
    
        <form method="POST">
    
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" 
                       class="form-control"
                       value="{{ student.name }}" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" 
                       class="form-control"
                       value="{{ student.email }}" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Course</label>
                <input type="text" name="course" 
                       class="form-control"
                       value="{{ student.course }}" required>
            </div>
    
            <div class="mb-3">
                <label class="form-label">Placement Status</label>
                <select name="placement_status">
                    <option value="Placed"
                        {% if student.placement_status == "Placed" %}selected{% endif %}>
                        Placed
                    </option>
                
                    <option value="Not Placed"
                        {% if student.placement_status == "Not Placed" %}selected{% endif %}>
                        Not Placed
                    </option>
                </select>
                
                
            </div>
    
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Update Student
                </button>
            
                <a href="{{ url_for('routes.students') }}" 
                   class="btn btn-secondary">
                    Cancel
                </a>
            </div>
            
    
        </form>
    </div>
    
    </body>
